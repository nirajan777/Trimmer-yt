services:
  - type: web
    name: trimmer-yt
    env: node
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg python3-pip
      pip install yt-dlp
      npm install --prefix server
      npm install --prefix client
      npm --prefix client run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "10000"
      - key: YTDL_NO_UPDATE
        value: "1"
